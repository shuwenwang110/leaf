<head>
<title>Falling Memory Leaves</title>

<style>
body {
  margin: 0;
  overflow: hidden;


  background:
  rgb(255, 255, 255);
background-size: auto 100vh;
}

/* 叶子 */
.leaf {
  position: fixed;
  top: -100px;
  pointer-events: none;
  will-change: transform;
  transition: filter 0.3s, opacity 0.3s;
}
</style>
</head>

<body>

<script>
const leafImages = ["leaf1.png", "leaf2.png"];

let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

function createLeaf() {
  const leaf = document.createElement("img");
  leaf.src = leafImages[Math.floor(Math.random() * leafImages.length)];
  leaf.className = "leaf";

  // 🍃 放大 3 倍
  const size = (Math.random() * 50 + 20) * 4;
  leaf.style.width = size + "px";

  let x = Math.random() * window.innerWidth;
  let y = -100;

  let depth = size / 210;

  // 🌫️ 景深
  const blur = (1 - depth) * 2;
  leaf.style.filter = `blur(${blur}px)`;
  leaf.style.opacity = 0.5 + depth * 0.5;

  // 🌑 阴影（重点！！！）
  // 越近的叶子阴影越明显
  leaf.style.filter += ` drop-shadow(0px ${4 * depth}px ${8 * depth}px rgba(0,0,0,0.5))`;

  // 🌬️ 慢速
  let speed = 0.6 + depth * 0.6;

  let sway = Math.random() * 100;
  let swaySpeed = 0.008 + Math.random() * 0.01;

  let rotation = Math.random() * 360;
  let rotateSpeed = (Math.random() - 0.5) * 0.4;

  document.body.appendChild(leaf);

  function animate() {
    y += speed;
    sway += swaySpeed;
    rotation += rotateSpeed;

    let dx = x - mouse.x;
    let dy = y - mouse.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 180) {
      x += dx * 0.01;
      y += dy * 0.01;
    }

    x += Math.sin(sway) * 0.4;

    leaf.style.transform = `
      translate(${x}px, ${y}px)
      rotate(${rotation}deg)
    `;

    if (y > window.innerHeight + 120) {
      leaf.remove();
    } else {
      requestAnimationFrame(animate);
    }
  }

  animate();
}

// 🍃 稀疏一点（更高级）
setInterval(createLeaf, 900);
</script>

</body>
</html>
